# VPS Health Monitor - Every 15 minutes
name: "VPS Health Monitor"
schedule: "*/15 * * * *"
timezone: "America/Sao_Paulo"
deliver: "discord:CHANNEL_ID"
prompt: |
  Verifique saúde do sistema VPS (Linux Ubuntu):
  - CPU usage (%)
  - Memória RAM usage (%)
  - Disco usage (%)
  - Uptime
  - Load average

  REGRAS CRÍTICAS:
  - Se CPU > 80% OU Memória > 85% OU Disco > 90%: ALERTE no Discord com detalhes e sugestões
  - Se tudo OK: NÃO faça nada (silêncio total - sem mensagem)
  - Use comandos: top, free -h, df -h, uptime

