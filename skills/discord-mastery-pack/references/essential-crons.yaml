# Weekly Executive Report - Sunday 20:00
name: "Weekly Executive Report"
schedule: "0 20 * * 0"
timezone: "America/Sao_Paulo"
deliver: "discord:CHANNEL_ID"
prompt: |
  Gere um relatório semanal executivo para o Carlos.

  ## 📊 Relatório Semanal - $(date +'%d/%m/%Y')

  ### ✅ Conquistas da Semana
  - Liste 3-5 itens principais concluídos

  ### 📈 Métricas
  - Sessões ativas: [extrair de hermes sessions list]
  - Tokens usados: [estimativa]
  - Cron jobs executados: [count]

  ### 🎯 Próxima Semana
  - Top 3 prioridades

  ### ⚠️ Alertas/Riscos
  - Qualquer item que precise de atenção

  Seja conciso, direto, tom executivo. Entregue no Discord.

