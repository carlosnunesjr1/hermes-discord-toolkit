# Token Compression Routine - Every 6 hours
name: "Token Compression Routine"
schedule: "0 */6 * * *"
timezone: "America/Sao_Paulo"
deliver: "discord:CHANNEL_ID"
prompt: |
  Execute compressão de contexto automática para controle de tokens:

  1. Identifique sessões antigas/ativas com histórico longo
  2. Execute /compress para comprimir histórico preservando decisões-chave
  3. Relate:
     - Sessões comprimidas
     - Tokens estimados economizados
     - Contexto preservado vs comprimido

  Seja técnico, conciso. Use ferramenta compress nativa.